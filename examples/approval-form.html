<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >
    <title>Approval Form</title>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-2">Approval request</h1>
        <p class="text-secondary mb-0">Choose how the waiting command should continue. A file edit is waiting for refresh.</p>
      </header>

      <form id="approval">
        <fieldset class="mb-4">
          <legend class="fs-6 fw-semibold mb-3">Decision</legend>

          <div class="form-check border rounded bg-white p-3 ps-5 mb-2">
            <input class="form-check-input" type="radio" name="decision" id="approve" value="approve" checked>
            <label class="form-check-label d-block" for="approve">
              <span class="fw-semibold">Approve</span>
              <span class="d-block text-secondary small">Continue with the requested operation.</span>
            </label>
          </div>

          <div class="form-check border rounded bg-white p-3 ps-5 mb-2">
            <input class="form-check-input" type="radio" name="decision" id="revise" value="revise">
            <label class="form-check-label d-block" for="revise">
              <span class="fw-semibold">Revise</span>
              <span class="d-block text-secondary small">Ask for changes before continuing.</span>
            </label>
          </div>

          <div class="form-check border rounded bg-white p-3 ps-5">
            <input class="form-check-input" type="radio" name="decision" id="reject" value="reject">
            <label class="form-check-label d-block" for="reject">
              <span class="fw-semibold">Reject</span>
              <span class="d-block text-secondary small">Stop the operation.</span>
            </label>
          </div>
        </fieldset>

        <label class="form-label" for="note">Note</label>
        <textarea class="form-control mb-3" id="note" name="note" rows="3" placeholder="Optional context"></textarea>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" name="notify" id="notify" value="yes">
          <label class="form-check-label" for="notify">Notify me when it finishes</label>
        </div>

        <button class="btn btn-primary" type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
