<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glimpse Review</title>
    <style>
      html, body, #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f8f9fa;
      }

      #glimpse-review-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }

      .glimpse-review-comments-toggle {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 2147483647;
        border: 0;
        border-radius: 7px;
        padding: 7px 10px;
        color: #4a3b1d;
        background: #fff8df;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        font: 700 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      .glimpse-review-refresh {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 8px;
        padding: 8px 10px;
        color: #1f2937;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        font: 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .glimpse-review-refresh button,
      .glimpse-review-selection-comment button,
      .glimpse-review-annotation button {
        border: 0;
        border-radius: 6px;
        padding: 6px 10px;
        font: 700 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      .glimpse-review-refresh button,
      .glimpse-review-selection-comment button[type="submit"] {
        color: #ffffff;
        background: #0d6efd;
      }

      .glimpse-review-annotation {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2147483647;
        max-width: min(280px, calc(100vw - 24px));
        padding: 10px 12px;
        border: 1px solid rgba(120, 80, 0, 0.22);
        border-radius: 8px;
        background: #fff8df;
        color: #2b2415;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .glimpse-review-annotation-arrow {
        position: absolute;
        width: 12px;
        height: 12px;
        transform: rotate(45deg);
        background: #fff8df;
      }

      .glimpse-review-annotation p {
        margin: 0 0 8px;
      }

      .glimpse-review-annotation-replies {
        margin-top: 8px;
        margin-bottom: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(120, 80, 0, 0.18);
        display: grid;
        gap: 6px;
        list-style: none;
        padding-left: 0;
      }

      .glimpse-review-annotation-reply {
        margin: 0;
        color: #4a3b1d;
      }

      .glimpse-review-annotation-reply strong {
        display: block;
        margin-bottom: 2px;
        font-size: 12px;
        color: #7a5a00;
      }

      .glimpse-review-annotation form,
      .glimpse-review-selection-comment form {
        display: grid;
        gap: 8px;
        margin: 0;
      }

      .glimpse-review-annotation textarea,
      .glimpse-review-selection-comment textarea {
        width: 100%;
        resize: vertical;
        box-sizing: border-box;
        border-radius: 6px;
        padding: 7px 8px;
        font: inherit;
      }

      .glimpse-review-annotation textarea {
        min-height: 58px;
        border: 1px solid rgba(120, 80, 0, 0.25);
        color: #2b2415;
        background: #fffdf5;
      }

      .glimpse-review-annotation button {
        justify-self: end;
        color: #1f2937;
        background: #ffc107;
      }

      .glimpse-review-annotation[data-placement^="bottom"] .glimpse-review-annotation-arrow {
        top: -7px;
        border-left: 1px solid rgba(120, 80, 0, 0.22);
        border-top: 1px solid rgba(120, 80, 0, 0.22);
      }

      .glimpse-review-annotation[data-placement^="top"] .glimpse-review-annotation-arrow {
        bottom: -7px;
        border-right: 1px solid rgba(120, 80, 0, 0.22);
        border-bottom: 1px solid rgba(120, 80, 0, 0.22);
      }

      .glimpse-review-annotation[data-placement^="right"] .glimpse-review-annotation-arrow {
        left: -7px;
        border-left: 1px solid rgba(120, 80, 0, 0.22);
        border-bottom: 1px solid rgba(120, 80, 0, 0.22);
      }

      .glimpse-review-annotation[data-placement^="left"] .glimpse-review-annotation-arrow {
        right: -7px;
        border-right: 1px solid rgba(120, 80, 0, 0.22);
        border-top: 1px solid rgba(120, 80, 0, 0.22);
      }

      .glimpse-review-selection-button {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2147483647;
        border: 0;
        border-radius: 999px;
        padding: 7px 11px;
        color: #ffffff;
        background: #0d6efd;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        font: 700 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      .glimpse-review-selection-comment {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2147483647;
        width: min(300px, calc(100vw - 24px));
        padding: 10px;
        border: 1px solid rgba(13, 110, 253, 0.22);
        border-radius: 8px;
        background: #ffffff;
        color: #1f2937;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .glimpse-review-selection-comment blockquote {
        margin: 0 0 8px;
        padding-left: 8px;
        border-left: 3px solid #0d6efd;
        color: #4b5563;
      }

      .glimpse-review-selection-comment textarea {
        min-height: 64px;
        border: 1px solid rgba(13, 110, 253, 0.24);
      }

      .glimpse-review-selection-comment footer {
        display: flex;
        justify-content: end;
        gap: 8px;
      }

      .glimpse-review-selection-comment button[type="button"] {
        color: #374151;
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
